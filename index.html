<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#222;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#f0f0f0;--muted:#888;--muted2:#555;
  --green:#22c97a;--pink:#ff6b9d;--red:#ff4f4f;--amber:#f5a623;
  --pink-dim:rgba(255,107,157,0.1);
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:15px;min-height:100vh;padding:2rem 1rem 5rem}
.container{max-width:680px;margin:0 auto}

.header{margin-bottom:2.5rem}
.eyebrow{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.title{font-family:'Syne',sans-serif;font-size:32px;font-weight:700;line-height:1.1}
.title span{color:var(--green)}
.subtitle{font-size:13px;color:var(--muted);margin-top:6px}

.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:1.5rem}
@media(min-width:520px){.stat-grid{grid-template-columns:repeat(4,1fr)}}
.stat{background:var(--surface);border:.5px solid var(--border);border-radius:10px;padding:14px 16px}
.stat-label{font-size:11px;color:var(--muted);margin-bottom:5px;letter-spacing:.03em}
.stat-value{font-size:20px;font-weight:600}
.stat-value.green{color:var(--green)}
.stat-value.red{color:var(--red)}
.stat-sub{font-size:11px;color:var(--muted2);margin-top:3px}

.card{background:var(--surface);border:.5px solid var(--border);border-radius:14px;padding:1.25rem 1.5rem;margin-bottom:1rem}
.card-title{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted2);margin-bottom:1rem}

.sep{display:flex;align-items:center;gap:10px;margin:1rem 0 .75rem}
.sep-label{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);white-space:nowrap}
.sep-line{flex:1;height:.5px;background:var(--border)}

.item{display:flex;align-items:flex-start;gap:12px;padding:11px 0;border-top:.5px solid var(--border)}
.item:first-of-type{border-top:none;padding-top:0}
.cb{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--muted2);flex-shrink:0;margin-top:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cb:hover{border-color:var(--green)}
.cb.checked{background:var(--green);border-color:var(--green)}
.cb.checked::after{content:'';width:9px;height:6px;border-left:2px solid #000;border-bottom:2px solid #000;transform:rotate(-45deg) translateY(-1px);display:block}
.item-body{flex:1;min-width:0}
.item-name{font-size:14px;color:var(--text);line-height:1.4}
.item-name.done{text-decoration:line-through;color:var(--muted2)}
.item-meta{font-size:11px;color:var(--muted2);margin-top:3px}
.alts{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px}
.alt{font-size:11px;padding:3px 9px;background:var(--surface2);border:.5px solid var(--border2);border-radius:20px;color:var(--muted)}
.item-price{font-size:14px;font-weight:500;flex-shrink:0}
.item-price.done{color:var(--muted2)}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500;margin-left:7px;vertical-align:middle}
.badge-vidu{background:var(--pink-dim);color:var(--pink);border:.5px solid rgba(255,107,157,.25)}

.total-row{display:flex;justify-content:space-between;align-items:center;padding-top:1rem;margin-top:.5rem;border-top:.5px solid var(--border)}
.total-label{font-size:12px;color:var(--muted)}
.total-val{font-size:17px;font-weight:600}
.progress{height:4px;background:var(--border2);border-radius:2px;margin-top:10px;overflow:hidden}
.progress-fill{height:100%;background:var(--green);border-radius:2px;transition:width .4s ease}

/* Month cards */
.month-stack{display:flex;flex-direction:column;gap:8px}
.month-card{border-radius:10px;padding:14px 16px;border:.5px solid var(--border)}
.m-jun{background:rgba(245,166,35,.06);border-color:rgba(245,166,35,.2)}
.m-jul{background:rgba(100,140,255,.05);border-color:rgba(100,140,255,.15)}
.m-aug{background:rgba(100,170,255,.05);border-color:rgba(100,170,255,.12)}
.m-sep{background:rgba(34,201,122,.05);border-color:rgba(34,201,122,.18)}
.month-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.month-name{font-size:15px;font-weight:500}
.month-tag{font-size:10px;background:rgba(255,255,255,.06);color:var(--muted);padding:2px 8px;border-radius:20px;margin-left:8px}
.month-total{font-size:15px;font-weight:600}
.month-line{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);padding:2px 0}
.pos{color:var(--green)} .neg{color:var(--red)}
.month-empty{font-size:12px;color:var(--muted2);font-style:italic}

/* Log modal overlay — normal-flow faux viewport */
.modal-bg{display:none;min-height:100vh;background:rgba(0,0,0,.7);position:fixed;inset:0;z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border:.5px solid var(--border2);border-radius:16px;padding:1.5rem;width:min(420px,92vw)}
.modal h3{font-size:17px;font-weight:600;margin-bottom:1.25rem}
.form-group{margin-bottom:1rem}
.form-group label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
.form-group select,.form-group input[type=date],.form-group input[type=number]{width:100%;background:var(--surface2);border:.5px solid var(--border2);border-radius:8px;color:var(--text);font-size:14px;padding:9px 12px;outline:none}
.form-group select:focus,.form-group input:focus{border-color:var(--green)}
.modal-actions{display:flex;gap:8px;margin-top:1.25rem}
.btn{padding:9px 18px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;border:.5px solid var(--border2);background:transparent;color:var(--text);transition:background .15s}
.btn:hover{background:var(--surface2)}
.btn.primary{background:var(--green);color:#000;border-color:var(--green)}
.btn.primary:hover{background:#1db36a}
.btn-log{font-size:11px;padding:3px 10px;border-radius:20px;background:transparent;border:.5px solid var(--border2);color:var(--muted);cursor:pointer;margin-top:5px;transition:border-color .15s}
.btn-log:hover{border-color:var(--green);color:var(--green)}

/* Purchase log list */
.log-list{display:flex;flex-direction:column;gap:6px;margin-top:.5rem}
.log-entry{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:8px 10px;background:var(--surface2);border-radius:8px}
.log-entry .log-name{color:var(--text)}
.log-entry .log-right{display:flex;align-items:center;gap:10px}
.log-entry .log-date{color:var(--muted);font-size:11px}
.log-entry .log-amt{font-weight:500;color:var(--green)}
.log-entry .log-del{background:none;border:none;color:var(--muted2);cursor:pointer;font-size:14px;padding:0 2px;line-height:1}
.log-entry .log-del:hover{color:var(--red)}
.log-empty{font-size:13px;color:var(--muted2);font-style:italic;padding:.5rem 0}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="eyebrow">June – September 2026</div>
    <div class="title">Saving up <span>smartly</span></div>
    <div class="subtitle">Your wishlist + Vidu's birthday gifts — check off as you go</div>
  </div>

  <div class="stat-grid" id="stats"></div>

  <div class="card">
    <div class="card-title">Wishlist — tap to check off as you buy</div>
    <div class="sep"><span class="sep-label">Your stuff</span><span class="sep-line"></span></div>
    <div id="your-items"></div>
    <div class="sep"><span class="sep-label">🎂 Vidu's birthday gifts</span><span class="sep-line"></span></div>
    <div id="vidu-items"></div>
    <div class="total-row">
      <span class="total-label">Total remaining to spend</span>
      <span class="total-val" id="total-remaining"></span>
    </div>
    <div class="progress"><div class="progress-fill" id="prog"></div></div>
  </div>

  <div class="card">
    <div class="card-title">Month by month</div>
    <div class="month-stack" id="months"></div>
  </div>

  <div class="card">
    <div class="card-title">Purchase log</div>
    <button class="btn" style="font-size:13px;padding:7px 14px;margin-bottom:.75rem" onclick="openLog()">+ Log a purchase</button>
    <div id="log-list"></div>
  </div>
</div>

<!-- Modal -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h3>Log a purchase</h3>
    <div class="form-group">
      <label>What did you buy?</label>
      <select id="log-item">
        <option value="">— pick an item —</option>
      </select>
    </div>
    <div class="form-group">
      <label>Date bought</label>
      <input type="date" id="log-date">
    </div>
    <div class="form-group">
      <label>Amount paid (₹)</label>
      <input type="number" id="log-amount" placeholder="e.g. 7000">
    </div>
    <div class="modal-actions">
      <button class="btn primary" onclick="saveLog()">Save</button>
      <button class="btn" onclick="closeLog()">Cancel</button>
    </div>
  </div>
</div>

<script>
const ITEMS = {
  your: [
    { id:'iph', name:'iPhone battery change', price:3802 },
    { id:'wat', name:'Seiko submariner watch', price:19999, alts:['Seiko ₹19,999','Invicta ₹11,550'] },
  ],
  vidu: [
    { id:'cam', name:'Sony Cyber-shot camera', price:7000, alts:['W800 ₹7k','W800 ₹7.5k','W570 ₹8k','W570 ₹8.5k'] },
    { id:'mem', name:'Memory card + spare battery', price:1500 },
    { id:'flo', name:'Pink lily flowers', price:350, alts:['₹300–400'] },
    { id:'mag', name:'Magazine book (anchorcustoms.in)', price:999 },
    { id:'jew', name:'Jewelleries from CST, Mumbai', price:1000 },
  ]
};

const JUNE_SAV=4000, MOMS=3500, MONTHLY=10000;
const MONTHS_LIST = [
  {key:'jun',name:'June',cls:'m-jun'},
  {key:'jul',name:'July',cls:'m-jul'},
  {key:'aug',name:'August',cls:'m-aug'},
  {key:'sep',name:'September',cls:'m-sep'},
];
const MONTH_SAVINGS = {jun:JUNE_SAV+MOMS, jul:MONTHLY, aug:MONTHLY, sep:MONTHLY};

// --- Persistence ---
function load(key, def) { try { return JSON.parse(localStorage.getItem(key)) ?? def; } catch { return def; } }
function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

let checked = load('bt_checked', {});
let purchases = load('bt_purchases', []); // [{id, name, date, amount}]

const allItems = () => [...ITEMS.your, ...ITEMS.vidu];
const fmt = n => '₹' + Math.abs(Math.round(n)).toLocaleString('en-IN');
const fmtDate = d => { const [y,m,dd]=d.split('-'); const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; return `${parseInt(dd)} ${mo[parseInt(m)-1]} ${y}`; };

function totalRemaining() { return allItems().filter(i=>!checked[i.id]).reduce((s,i)=>s+i.price,0); }
function totalSpent() { return purchases.reduce((s,p)=>s+Number(p.amount),0); }
function totalBudget() { return JUNE_SAV+MOMS+MONTHLY*3; }

// Savings accumulated by month (cumulative from June)
function savingsByMonth(mkey) {
  const order = ['jun','jul','aug','sep'];
  let total = 0;
  for (const k of order) { total += MONTH_SAVINGS[k]; if (k===mkey) break; }
  return total;
}

// Purchases in a given month
function purchasesInMonth(mkey) {
  const monthMap = {jun:'2026-06',jul:'2026-07',aug:'2026-08',sep:'2026-09'};
  return purchases.filter(p => p.date && p.date.startsWith(monthMap[mkey]));
}

function renderStats() {
  const rem = totalRemaining(), pocket = totalBudget()-totalSpent()-rem;
  const left = allItems().filter(i=>!checked[i.id]).length;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-label">Total budget</div><div class="stat-value">${fmt(totalBudget())}</div><div class="stat-sub">Jun–Sep savings</div></div>
    <div class="stat"><div class="stat-label">Mom's gift</div><div class="stat-value">${fmt(MOMS)}</div><div class="stat-sub">no payback</div></div>
    <div class="stat"><div class="stat-label">Wishlist left</div><div class="stat-value">${fmt(rem)}</div><div class="stat-sub">${left} item${left!==1?'s':''} to go</div></div>
    <div class="stat"><div class="stat-label">End of Sep</div><div class="stat-value ${pocket>=0?'green':'red'}">${pocket<0?'-':''}${fmt(pocket)}</div><div class="stat-sub">in your pocket</div></div>
  `;
}

function renderList(items, elId, isVidu) {
  document.getElementById(elId).innerHTML = items.map(item => {
    const done = !!checked[item.id];
    const alts = item.alts ? item.alts.map(a=>`<span class="alt">${a}</span>`).join('') : '';
    const badge = isVidu ? `<span class="badge badge-vidu">Vidu</span>` : '';
    // Show last logged purchase date if any
    const logs = purchases.filter(p=>p.id===item.id);
    const meta = done && logs.length ? `<div class="item-meta">bought ${fmtDate(logs[logs.length-1].date)} · ${fmt(logs[logs.length-1].amount)}</div>` : '';
    return `<div class="item">
      <div class="cb ${done?'checked':''}" onclick="toggleItem('${item.id}')"></div>
      <div class="item-body">
        <span class="item-name ${done?'done':''}">${item.name}</span>${badge}
        ${alts ? `<div class="alts">${alts}</div>` : ''}
        ${meta}
      </div>
      <div class="item-price ${done?'done':''}">${fmt(item.price)}</div>
    </div>`;
  }).join('');
}

function renderTotal() {
  document.getElementById('total-remaining').textContent = fmt(totalRemaining());
  document.getElementById('prog').style.width = Math.min(100,Math.round(totalSpent()/totalBudget()*100))+'%';
}

function renderMonths() {
  document.getElementById('months').innerHTML = MONTHS_LIST.map(m => {
    const savings = MONTH_SAVINGS[m.key];
    const ps = purchasesInMonth(m.key);
    const spentHere = ps.reduce((s,p)=>s+Number(p.amount),0);
    const cumSavings = savingsByMonth(m.key);
    const cumSpent = purchases.filter(p=>{
      const order=['jun','jul','aug','sep'];
      const monthMap={jun:'2026-06',jul:'2026-07',aug:'2026-08',sep:'2026-09'};
      const idx = order.indexOf(m.key);
      return order.slice(0,idx+1).some(k=>p.date&&p.date.startsWith(monthMap[k]));
    }).reduce((s,p)=>s+Number(p.amount),0);
    const balance = cumSavings - cumSpent;
    const savLabel = m.key==='jun' ? `Savings + Mom's gift` : 'Monthly savings';
    return `<div class="month-card ${m.cls}">
      <div class="month-header">
        <div><span class="month-name">${m.name}</span></div>
        <span class="month-total ${balance>=0?'pos':'neg'}">${balance<0?'-':''}${fmt(balance)}</span>
      </div>
      <div class="month-line"><span>${savLabel}</span><span class="pos">+${fmt(savings)}</span></div>
      ${ps.length ? ps.map(p=>`<div class="month-line"><span>${p.name}</span><span class="neg">-${fmt(p.amount)}</span></div>`).join('') : `<div class="month-empty">no purchases logged yet</div>`}
    </div>`;
  }).join('');
}

function renderLogList() {
  const el = document.getElementById('log-list');
  if (!purchases.length) { el.innerHTML='<div class="log-empty">nothing logged yet</div>'; return; }
  const sorted = [...purchases].sort((a,b)=>b.date.localeCompare(a.date));
  el.innerHTML = `<div class="log-list">${sorted.map((p,i)=>`
    <div class="log-entry">
      <span class="log-name">${p.name}${ITEMS.vidu.find(v=>v.id===p.id)?` <span class="badge badge-vidu" style="font-size:9px">Vidu</span>`:''}</span>
      <div class="log-right">
        <span class="log-date">${fmtDate(p.date)}</span>
        <span class="log-amt">${fmt(p.amount)}</span>
        <button class="log-del" onclick="deleteLog(${purchases.indexOf(p)})" title="Remove">×</button>
      </div>
    </div>`).join('')}</div>`;
}

function toggleItem(id) {
  checked[id] = !checked[id];
  save('bt_checked', checked);
  render();
}

// Modal
function openLog() {
  const sel = document.getElementById('log-item');
  sel.innerHTML = '<option value="">— pick an item —</option>';
  [...ITEMS.your,...ITEMS.vidu].forEach(item => {
    const opt = document.createElement('option');
    opt.value = item.id;
    opt.textContent = item.name + (ITEMS.vidu.find(v=>v.id===item.id) ? ' (Vidu)' : '');
    sel.appendChild(opt);
  });
  document.getElementById('log-date').value = new Date().toISOString().slice(0,10);
  document.getElementById('log-amount').value = '';
  document.getElementById('modal-bg').classList.add('open');
}
function closeLog() { document.getElementById('modal-bg').classList.remove('open'); }

function saveLog() {
  const id = document.getElementById('log-item').value;
  const date = document.getElementById('log-date').value;
  const amount = document.getElementById('log-amount').value;
  if (!id || !date || !amount) { alert('Fill in all fields'); return; }
  const item = allItems().find(i=>i.id===id);
  purchases.push({ id, name:item.name, date, amount:Number(amount) });
  checked[id] = true;
  save('bt_purchases', purchases);
  save('bt_checked', checked);
  closeLog();
  render();
}

function deleteLog(idx) {
  purchases.splice(idx, 1);
  // uncheck if no more logs for that item
  const removedId = purchases[idx] ? purchases[idx].id : null;
  save('bt_purchases', purchases);
  // recheck from remaining logs
  const stillChecked = {};
  purchases.forEach(p => stillChecked[p.id] = true);
  // keep manually checked items too
  Object.keys(checked).forEach(k => { if (checked[k] && !stillChecked[k]) delete checked[k]; });
  save('bt_checked', checked);
  render();
}

document.getElementById('modal-bg').addEventListener('click', e => { if(e.target===e.currentTarget) closeLog(); });

function render() {
  renderStats();
  renderList(ITEMS.your,'your-items',false);
  renderList(ITEMS.vidu,'vidu-items',true);
  renderTotal();
  renderMonths();
  renderLogList();
}
render();
</script>
</body>
</html>
